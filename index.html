<!DOCTYPE html>
<html>
<head>
  <title>Crown Black Car</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>CROWN BLACK CAR</h1>
    <p>Luxury Black Car & Chauffeur Service</p>
    <p>BMW 5 Series • Cadillac Escalade</p>

    <button onclick="alert('Call/Text: 323-895-3648')">
      Book Your Ride
    </button>
  </div>

  <!-- BOOKING FORM -->
  <div class="booking">

    <h2>Book Your Ride</h2>
    <p>Fill out the form below and we will contact you</p>

    <!-- Netlify Form -->
    <form name="booking" method="POST" data-netlify="true">

      <input type="hidden" name="form-name" value="booking">

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="text" name="pickup" placeholder="Pickup Location" required>

      <input type="text" name="dropoff" placeholder="Drop-off Location" required>

      <input type="datetime-local" name="time" required>

      <input type="tel" name="phone" placeholder="Phone Number (323-895-3648)" required>

      <button type="submit">Submit Booking</button>

    </form>

  </div>

  <!-- SERVICES -->
  <div class="info">
    <h2>Services</h2>
    <ul>
      <li>Airport Transfers</li>
      <li>Business Travel</li>
      <li>Events & VIP Rides</li>
    </ul>
  </div>

  <!-- CONTACT -->
  <div class="contact">
    <h2>Contact</h2>
    <p>Phone: 323-895-3648</p>
    <p>Email: harnurbehl7@gmail.com</p>
  </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Crown Black Car</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="hero">
    <h1>CROWN BLACK CAR</h1>
    <p>Luxury Black Car & Chauffeur Service</p>
    <p>BMW 5 Series • Cadillac Escalade</p>

    <button onclick="alert('Call/Text: 323-895-3648')">
      Book Your Ride
    </button>
  </div>

  <!-- BOOKING FORM (SAFE VERSION) -->
  <div class="booking">
    <h2>Book Your Ride</h2>

    <form id="bookingForm">

      <input type="text" id="name" placeholder="Your Name" required>
      <input type="text" id="pickup" placeholder="Pickup Location" required>
      <input type="text" id="dropoff" placeholder="Drop-off Location" required>
      <input type="datetime-local" id="time" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>

      <button type="submit">Submit Booking</button>

    </form>

    <p id="msg"></p>
  </div>

  <div class="info">
    <h2>Services</h2>
    <ul>
      <li>Airport Transfers</li>
      <li>Business Travel</li>
      <li>Events & VIP Rides</li>
    </ul>
  </div>

  <div class="contact">
    <h2>Contact</h2>
    <p>Phone: 323-895-3648</p>
    <p>Email: harnurbehl7@gmail.com</p>
  </div>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let pickup = document.getElementById("pickup").value;
  let dropoff = document.getElementById("dropoff").value;
  let time = document.getElementById("time").value;
  let phone = document.getElementById("phone").value;

  let message = 
`New Booking Request:
Name: ${name}
Pickup: ${pickup}
Dropoff: ${dropoff}
Time: ${time}
Phone: ${phone}`;

  window.location.href = "mailto:harnurbehl7@gmail.com?subject=New Booking&body=" + encodeURIComponent(message);

  document.getElementById("msg").innerText = "Booking sent to email!";
});
</script>

</body>
</html>
